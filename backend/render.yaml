services:
  - type: web
    name: zy-invest-api
    runtime: python
    pythonVersion: "3.11.8"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: TZ
        value: Asia/Kuala_Lumpur