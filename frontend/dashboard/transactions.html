<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Transactions — ZY-Invest</title>
  <link rel="icon" href="../assets/img/logo.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
<div class="dash-root">
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="dash-main" id="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open');document.getElementById('sidebar-overlay').style.display='block'">☰</button>
        <span class="topbar-title" id="topbar-title">My Transactions</span>
      </div>
      <div class="topbar-right"><span class="topbar-date" id="topbar-date"></span></div>
    </header>
    <div class="dash-content">
      <div class="page-header">
        <div class="breadcrumb"><a href="../index.html">ZY-Invest</a><span>›</span><span>My Account</span><span>›</span><span>Transactions</span></div>
        <h1>My Transactions</h1>
        <p>Complete trade history for your account.</p>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h3>Transaction Records</h3>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="search-input" placeholder="Search instrument..." style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-md);font-size:0.85rem;width:180px" oninput="filterTable()">
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Instrument</th><th>Class</th><th>Sector</th><th>Units</th><th>Price</th><th class="td-right">Net Amount</th><th>Theme</th></tr></thead>
            <tbody id="txn-body"><tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr></tbody>
          </table>
        </div>
        <div class="panel-footer" id="txn-footer">Loading...</div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
let allTxns = [];
document.addEventListener('DOMContentLoaded', async () => {
  initDashboard('transactions', 'My Transactions');
  await loadTxns(1);
});

async function loadTxns(page) {
  try {
    const data = await api.get(`/api/member/account/transactions?page=${page}&limit=100`);
    const tbody = document.getElementById('txn-body');
    if (!data || !data.data.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">No transactions found</td></tr>'; return; }
    allTxns = data.data;
    renderTxns(allTxns);
    document.getElementById('txn-footer').textContent = `Showing ${data.data.length} of ${data.total} transactions`;
  } catch(e) { showToast('Failed to load transactions','error'); }
}

function renderTxns(txns) {
  document.getElementById('txn-body').innerHTML = txns.map(r => {
    const isBuy = Number(r.units) > 0;
    return `<tr>
      <td>${fmtDate(r.date)}</td>
      <td style="font-weight:600">${r.instrument}</td>
      <td><span class="pill pill-gray" style="font-size:0.72rem">${r.asset_class||'—'}</span></td>
      <td style="color:var(--text-muted);font-size:0.82rem">${r.sector||'—'}</td>
      <td><span class="${isBuy?'pill pill-green':'pill pill-red'}">${isBuy?'+':''}${fmtNum(r.units)}</span></td>
      <td>RM ${Number(r.price||0).toFixed(4)}</td>
      <td class="td-right" style="color:${isBuy?'#DC2626':'var(--green)'};font-weight:600">${isBuy?'-':'+'}${fmtRM(Math.abs(r.net_amount))}</td>
      <td><span class="pill pill-gray" style="font-size:0.72rem">${r.theme||'—'}</span></td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderTxns(allTxns.filter(r => r.instrument.toLowerCase().includes(q) || (r.sector||'').toLowerCase().includes(q)));
}
</script>
</body>
</html>
