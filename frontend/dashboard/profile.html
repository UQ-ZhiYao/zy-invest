<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Profile — ZY-Invest</title>
  <link rel="icon" href="../assets/img/logo.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <style>
    .form-group { margin-bottom: 20px; }
    .form-label { display:block;font-size:0.85rem;font-weight:600;color:var(--gray-700,#374151);margin-bottom:8px; }
    .form-input { width:100%;padding:10px 14px;font-family:var(--font-body);font-size:0.95rem;background:var(--gray-50);border:1.5px solid var(--border);border-radius:var(--radius-md);color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s; }
    .form-input:focus { border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,0.1);background:var(--white); }
    .form-input:disabled { opacity:0.6;cursor:not-allowed; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    @media(max-width:600px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="dash-root">
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="dash-main" id="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open');document.getElementById('sidebar-overlay').style.display='block'">☰</button>
        <span class="topbar-title" id="topbar-title">Personal Profile</span>
      </div>
      <div class="topbar-right"><span class="topbar-date" id="topbar-date"></span></div>
    </header>
    <div class="dash-content">
      <div class="page-header">
        <div class="breadcrumb"><a href="../index.html">ZY-Invest</a><span>›</span><span>My Account</span><span>›</span><span>Personal Profile</span></div>
        <h1>Personal Profile</h1>
        <p>Update your contact information and personal details.</p>
      </div>
      <div style="max-width:600px">
        <div class="panel">
          <div class="panel-header"><h3>Profile Information</h3></div>
          <div class="panel-body">
            <form id="profile-form" onsubmit="saveProfile(event)">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="f-name" class="form-input" placeholder="Your full name" required>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="f-email" class="form-input" placeholder="your@email.com" required>
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" id="f-phone" class="form-input" placeholder="+60 12-345 6789">
              </div>
              <div class="form-group">
                <label class="form-label">Role</label>
                <input type="text" id="f-role" class="form-input" disabled>
              </div>
              <button type="submit" class="btn btn-primary" id="save-btn">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  initDashboard('profile', 'Personal Profile');
  try {
    const d = await api.get('/api/member/account/profile');
    if (!d) return;
    document.getElementById('f-name').value  = d.name || '';
    document.getElementById('f-email').value = d.email || '';
    document.getElementById('f-phone').value = d.phone || '';
    document.getElementById('f-role').value  = authUser().role || '';
  } catch(e) { showToast('Failed to load profile','error'); }
});

async function saveProfile(e) {
  e.preventDefault();
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await api.put('/api/member/account/profile', {
      name:  document.getElementById('f-name').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
    });
    showToast('Profile updated successfully','success');
  } catch(e) { showToast('Failed to save profile','error'); }
  btn.disabled = false; btn.textContent = 'Save Changes';
}
</script>
</body>
</html>
