<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Data Analysis — ZY-Invest</title>
  <link rel="icon" href="../../assets/img/logo.png">
  <link rel="stylesheet" href="mobile.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
<header class="m-header">
  <a href="index.html" class="m-logo"><img src="../../assets/img/logo.png" alt="ZY"><span>ZY-Invest</span></a>
  <button class="m-hamburger" onclick="mOpenMenu()"><span></span><span></span><span></span></button>
</header>
<div id="m-menu" class="m-menu">
  <div class="m-menu-header"><div class="m-menu-brand"><img src="../../assets/img/logo.png" alt="ZY"><span>ZY-Invest</span></div><button class="m-menu-close" onclick="mCloseMenu()">✕</button></div>
  <div class="m-menu-user"><div class="m-menu-user-name"></div><div class="m-menu-user-inv"></div></div>
  <nav class="m-menu-nav"></nav>
  <div class="m-menu-footer"><button class="m-logout-btn">Sign Out</button></div>
</div>

<div class="m-page">
  <div class="m-page-title">Data Analysis</div>
  <div class="m-page-sub">Portfolio allocation breakdown</div>

  <div class="m-card" id="analysis-tabs-card">
    <div class="m-tabs">
      <button class="m-tab active" data-tab="class">By Class</button>
      <button class="m-tab" data-tab="sector">By Sector</button>
      <button class="m-tab" data-tab="cashflow">Cashflow</button>
    </div>

    <div id="tab-class" class="m-tab-panel active">
      <div class="m-card-body" style="padding-bottom:8px">
        <div class="m-chart"><canvas id="chart-class"></canvas></div>
      </div>
      <div class="m-card-body" id="class-list"></div>
    </div>

    <div id="tab-sector" class="m-tab-panel">
      <div class="m-card-body" style="padding-bottom:8px">
        <div class="m-chart"><canvas id="chart-sector"></canvas></div>
      </div>
      <div class="m-card-body" id="sector-list"></div>
    </div>

    <div id="tab-cashflow" class="m-tab-panel">
      <div class="m-card-body" style="padding-bottom:8px">
        <div class="m-chart"><canvas id="chart-cashflow"></canvas></div>
      </div>
    </div>
  </div>
</div>

<script src="mobile.js"></script>
<script>
const COLORS = ['#1565C0','#2E7D32','#F59E0B','#7C3AED','#DB2777',
                '#0891B2','#D97706','#16A34A','#DC2626','#6366F1'];

document.addEventListener('DOMContentLoaded', async () => {
  if (!mAuthCheck()) return;
  mInitMenu('analysis.html');
  document.querySelectorAll('.m-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.m-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.m-tab-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    });
  });
  try {
    const d = await mApi.get('/api/member/fund/analysis');
    // By class chart
    const cls = d.by_class || [];
    new Chart(document.getElementById('chart-class').getContext('2d'), {
      type:'doughnut',
      data:{ labels: cls.map(r=>r.asset_class),
             datasets:[{ data: cls.map(r=>Number(r.weight_pct||0)),
               backgroundColor: COLORS, borderWidth:2 }] },
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}} } }
    });
    document.getElementById('class-list').innerHTML = cls.map((r,i) => `
      <div class="m-list-row">
        <span class="m-list-label" style="display:flex;align-items:center;gap:8px">
          <span style="width:10px;height:10px;border-radius:2px;background:${COLORS[i%COLORS.length]};flex-shrink:0"></span>
          ${mEsc(r.asset_class)}
        </span>
        <span class="m-list-value">${Number(r.weight_pct||0).toFixed(1)}%</span>
      </div>`).join('');

    // By sector chart
    const sec = d.by_sector || [];
    new Chart(document.getElementById('chart-sector').getContext('2d'), {
      type:'bar',
      data:{ labels: sec.map(r=>r.sector||r.asset_class),
             datasets:[{ data: sec.map(r=>Number(r.weight_pct||0)),
               backgroundColor: COLORS, borderRadius:6 }] },
      options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
        plugins:{ legend:{display:false} },
        scales:{ x:{ ticks:{ callback:v=>v+'%' } } } }
    });
    document.getElementById('sector-list').innerHTML = sec.map((r,i) => `
      <div class="m-list-row">
        <span class="m-list-label">${mEsc(r.sector||r.asset_class)}</span>
        <span class="m-list-value">${Number(r.weight_pct||0).toFixed(1)}%</span>
      </div>`).join('');

    // Cashflow chart
    const qtr = d.principal_quarterly || [];
    new Chart(document.getElementById('chart-cashflow').getContext('2d'), {
      type:'bar',
      data:{ labels: qtr.map(r=>r.quarter),
             datasets:[
               { label:'Inflow',  data:qtr.map(r=>Number(r.inflow||0)),
                 backgroundColor:'rgba(46,125,50,.75)', borderRadius:4 },
               { label:'Outflow', data:qtr.map(r=>-Number(r.outflow||0)),
                 backgroundColor:'rgba(198,40,40,.6)', borderRadius:4 },
             ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom',labels:{boxWidth:10,font:{size:11}}} },
        scales:{ y:{ ticks:{ callback:v=>Math.abs(v)>=1000?(v/1000).toFixed(0)+'K':v.toFixed(0) } } } }
    });
  } catch(e) { console.error(e); }
});
</script>
</body>
</html>
