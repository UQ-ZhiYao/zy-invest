<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Profile — ZY-Invest</title>
  <link rel="icon" href="../assets/img/logo.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <style>
    .form-group{margin-bottom:18px}
    .form-label{display:block;font-size:0.85rem;font-weight:600;color:var(--gray-700,#374151);margin-bottom:7px}
    .form-input{width:100%;padding:10px 14px;font-family:var(--font-body);font-size:0.93rem;background:var(--gray-50);border:1.5px solid var(--border);border-radius:var(--radius-md);color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    .form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,0.1);background:var(--white)}
    .form-input:disabled{opacity:0.55;cursor:not-allowed;background:var(--gray-100)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .sec-divider{border:none;border-top:1px solid var(--border);margin:24px 0 20px}
    .sec-title{font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px}
    .alert{display:none;border-radius:var(--radius-md);padding:12px 16px;font-size:0.88rem;margin-bottom:20px}
    .alert-success{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
    .alert-error{background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C}
    @media(max-width:640px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="dash-root">
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.style.display='none'"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="dash-main" id="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open');document.getElementById('sidebar-overlay').style.display='block'">☰</button>
        <span class="topbar-title" id="topbar-title">Personal Profile</span>
      </div>
      <div class="topbar-right"><span class="topbar-date" id="topbar-date"></span></div>
    </header>
    <div class="dash-content">
      <div class="page-header">
        <div class="breadcrumb"><a href="../index.html">ZY-Invest</a><span>›</span><span>My Account</span><span>›</span><span>Personal Profile</span></div>
        <h1>Personal Profile</h1>
        <p>Update your contact information, address, and banking details.</p>
      </div>
      <div style="max-width:680px">
        <div class="panel">
          <div class="panel-header"><h3>Profile Information</h3></div>
          <div class="panel-body">
            <div id="msg-success" class="alert alert-success">Profile updated successfully.</div>
            <div id="msg-error" class="alert alert-error"></div>
            <form id="profile-form" onsubmit="saveProfile(event)">

              <div class="sec-title">Personal Details</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Full Name</label>
                  <input type="text" id="f-name" class="form-input" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Role</label>
                  <input type="text" id="f-role" class="form-input" disabled>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Email Address</label>
                  <input type="email" id="f-email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                  <label class="form-label">Phone Number</label>
                  <input type="tel" id="f-phone" class="form-input" placeholder="+60 12-345 6789">
                </div>
              </div>

              <hr class="sec-divider">
              <div class="sec-title">Banking Information</div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">Bank Name</label>
                  <select id="f-bank-name" class="form-input">
                    <option value="">Select bank</option>
                    <option>Maybank</option><option>CIMB Bank</option>
                    <option>Public Bank</option><option>RHB Bank</option>
                    <option>Hong Leong Bank</option><option>AmBank</option>
                    <option>Affin Bank</option><option>Alliance Bank</option>
                    <option>Bank Islam</option><option>Bank Rakyat</option>
                    <option>BSN</option><option>OCBC Bank</option>
                    <option>Standard Chartered</option><option>HSBC Bank</option>
                    <option>UOB Bank</option><option>Other</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Account Number</label>
                  <input type="text" id="f-bank-acc" class="form-input" placeholder="e.g. 1234567890">
                </div>
              </div>

              <hr class="sec-divider">
              <div class="sec-title">Home Address</div>
              <div class="form-group">
                <label class="form-label">Address Line 1</label>
                <input type="text" id="f-addr1" class="form-input" placeholder="Street address, unit number">
              </div>
              <div class="form-group">
                <label class="form-label">Address Line 2 <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
                <input type="text" id="f-addr2" class="form-input" placeholder="Apartment, suite, etc.">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">City</label>
                  <input type="text" id="f-city" class="form-input" placeholder="e.g. Kuala Lumpur">
                </div>
                <div class="form-group">
                  <label class="form-label">Postcode</label>
                  <input type="text" id="f-postcode" class="form-input" placeholder="e.g. 50450">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">State</label>
                  <select id="f-state" class="form-input">
                    <option value="">Select state</option>
                    <option>Johor</option><option>Kedah</option>
                    <option>Kelantan</option><option>Kuala Lumpur</option>
                    <option>Labuan</option><option>Melaka</option>
                    <option>Negeri Sembilan</option><option>Pahang</option>
                    <option>Penang</option><option>Perak</option>
                    <option>Perlis</option><option>Putrajaya</option>
                    <option>Sabah</option><option>Sarawak</option>
                    <option>Selangor</option><option>Terengganu</option>
                    <option>Other</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Country</label>
                  <input type="text" id="f-country" class="form-input" value="Malaysia">
                </div>
              </div>

              <button type="submit" class="btn btn-primary" id="save-btn" style="margin-top:8px">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  initDashboard('profile', 'Personal Profile');
  try {
    const d = await api.get('/api/member/account/profile');
    if (!d) return;
    document.getElementById('f-name').value      = d.name || '';
    document.getElementById('f-email').value     = d.email || '';
    document.getElementById('f-phone').value     = d.phone || '';
    document.getElementById('f-role').value      = authUser().role || '';
    document.getElementById('f-bank-name').value = d.bank_name || '';
    document.getElementById('f-bank-acc').value  = d.bank_account_no || '';
    document.getElementById('f-addr1').value     = d.address_line1 || '';
    document.getElementById('f-addr2').value     = d.address_line2 || '';
    document.getElementById('f-city').value      = d.city || '';
    document.getElementById('f-postcode').value  = d.postcode || '';
    document.getElementById('f-state').value     = d.state || '';
    document.getElementById('f-country').value   = d.country || 'Malaysia';
  } catch(e) { showToast('Failed to load profile', 'error'); }
});

async function saveProfile(e) {
  e.preventDefault();
  const ok  = document.getElementById('msg-success');
  const err = document.getElementById('msg-error');
  ok.style.display = err.style.display = 'none';
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await api.put('/api/member/account/profile', {
      name:            document.getElementById('f-name').value.trim(),
      email:           document.getElementById('f-email').value.trim(),
      phone:           document.getElementById('f-phone').value.trim(),
      bank_name:       document.getElementById('f-bank-name').value,
      bank_account_no: document.getElementById('f-bank-acc').value.trim(),
      address_line1:   document.getElementById('f-addr1').value.trim(),
      address_line2:   document.getElementById('f-addr2').value.trim(),
      city:            document.getElementById('f-city').value.trim(),
      postcode:        document.getElementById('f-postcode').value.trim(),
      state:           document.getElementById('f-state').value,
      country:         document.getElementById('f-country').value.trim(),
    });
    ok.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch(e) {
    err.textContent = e.message || 'Failed to save profile.';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Save Changes';
}
</script>
</body>
</html>
