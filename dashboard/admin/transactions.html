<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — ZY-Invest Admin</title>
  <link rel="icon" href="../../assets/img/logo.png">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <style>
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:0.83rem;font-weight:600;color:var(--gray-700,#374151);margin-bottom:6px}
    .form-input{width:100%;padding:9px 12px;font-family:var(--font-body);font-size:0.88rem;background:var(--gray-50);border:1.5px solid var(--border);border-radius:var(--radius-md);color:var(--text);outline:none}
    .form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,0.1);background:var(--white)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  </style>
</head>
<body>
<div class="dash-root">
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99" onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.style.display='none'"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="dash-main" id="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open');document.getElementById('sidebar-overlay').style.display='block'">☰</button>
        <span class="topbar-title" id="topbar-title">Transactions</span>
      </div>
      <div class="topbar-right"><span class="topbar-date" id="topbar-date"></span></div>
    </header>
    <div class="dash-content">
      <div class="page-header">
        <div class="breadcrumb"><a href="../../index.html">ZY-Invest</a><span>›</span><span>Admin</span><span>›</span><span>Transactions</span></div>
        <h1>Transactions</h1>
        <p>Add buy/sell transactions for investors.</p>
      </div>

      <!-- Add form -->
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-header"><h3>Add Transaction</h3></div>
        <div class="panel-body">
          <form id="txn-form" onsubmit="addTransaction(event)">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" id="t-date" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">Investor</label>
                <select id="t-investor" class="form-input" required>
                  <option value="">Select investor</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Instrument</label>
                <input type="text" id="t-instrument" class="form-input" placeholder="e.g. MYEG" required>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Asset Class</label>
                <select id="t-class" class="form-input">
                  <option>Securities [H]</option><option>Securities [M]</option>
                  <option>Securities [L]</option><option>Real Estate Trust</option>
                  <option>Money Market</option><option>Currencies</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Sector</label>
                <select id="t-sector" class="form-input">
                  <option>Technology</option><option>Financial Services</option>
                  <option>Industrial Products &amp; Services</option><option>Construction</option>
                  <option>Plantation</option><option>Utilities</option>
                  <option>Health Care</option><option>Consumer Products</option>
                  <option>Energy</option><option>Property</option>
                  <option>Transportation</option><option>Others</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Region</label>
                <select id="t-region" class="form-input">
                  <option value="MY">Malaysia (MY)</option>
                  <option value="US">United States (US)</option>
                  <option value="SG">Singapore (SG)</option>
                </select>
              </div>
            </div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">Units <span style="color:var(--text-muted);font-weight:400">(negative = sell)</span></label>
                <input type="number" id="t-units" class="form-input" placeholder="e.g. 1000 or -500" required>
              </div>
              <div class="form-group">
                <label class="form-label">Price (RM)</label>
                <input type="number" step="0.0001" id="t-price" class="form-input" placeholder="e.g. 0.775" required oninput="calcAmount()">
              </div>
              <div class="form-group">
                <label class="form-label">Total Fees (RM)</label>
                <input type="number" step="0.01" id="t-fees" class="form-input" placeholder="e.g. 12.50" value="0" oninput="calcAmount()">
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Amount (RM) <span style="color:var(--text-muted);font-weight:400">(auto-calculated)</span></label>
                <input type="number" step="0.01" id="t-amount" class="form-input" readonly style="background:var(--gray-100)">
              </div>
              <div class="form-group">
                <label class="form-label">Net Amount (RM)</label>
                <input type="number" step="0.01" id="t-net" class="form-input" readonly style="background:var(--gray-100)">
              </div>
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label">Theme</label>
                <select id="t-theme" class="form-input">
                  <option>Dividend</option><option>Speculative</option>
                  <option>Growth</option><option>Value</option><option>Others</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Notes</label>
                <input type="text" id="t-notes" class="form-input" placeholder="Optional notes">
              </div>
            </div>
            <button type="submit" class="btn btn-primary" id="add-txn-btn">Add Transaction</button>
          </form>
        </div>
      </div>

      <!-- Recent transactions -->
      <div class="panel">
        <div class="panel-header"><h3>Recent Transactions</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Investor</th><th>Instrument</th><th>Units</th><th>Price</th><th class="td-right">Net Amount</th><th>Theme</th></tr></thead>
            <tbody id="txn-table">
              <tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/dashboard.js"></script>
<script>
let investors = [];

document.addEventListener('DOMContentLoaded', async () => {
  initDashboard('admin-transactions', 'Transactions');
  document.getElementById('t-date').value = new Date().toISOString().slice(0,10);
  await loadInvestors();
  await loadTransactions();
});

async function loadInvestors() {
  try {
    investors = await api.get('/api/admin/investors') || [];
    const sel = document.getElementById('t-investor');
    investors.forEach(i => {
      const opt = document.createElement('option');
      opt.value = i.id; opt.textContent = i.name;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

function calcAmount() {
  const units = parseFloat(document.getElementById('t-units').value) || 0;
  const price = parseFloat(document.getElementById('t-price').value) || 0;
  const fees  = parseFloat(document.getElementById('t-fees').value) || 0;
  const amount = units * price;
  const net    = amount < 0 ? amount - fees : amount - fees;
  document.getElementById('t-amount').value = amount.toFixed(2);
  document.getElementById('t-net').value    = net.toFixed(2);
}

async function addTransaction(e) {
  e.preventDefault();
  const btn = document.getElementById('add-txn-btn');
  btn.disabled = true; btn.textContent = 'Adding...';
  try {
    await api.post('/api/admin/transactions', {
      date:        document.getElementById('t-date').value,
      investor_id: document.getElementById('t-investor').value,
      instrument:  document.getElementById('t-instrument').value.trim().toUpperCase(),
      asset_class: document.getElementById('t-class').value,
      sector:      document.getElementById('t-sector').value,
      region:      document.getElementById('t-region').value,
      units:       parseFloat(document.getElementById('t-units').value),
      price:       parseFloat(document.getElementById('t-price').value),
      amount:      parseFloat(document.getElementById('t-amount').value),
      total_fees:  parseFloat(document.getElementById('t-fees').value) || 0,
      net_amount:  parseFloat(document.getElementById('t-net').value),
      theme:       document.getElementById('t-theme').value,
      notes:       document.getElementById('t-notes').value.trim(),
    });
    showToast('Transaction added successfully', 'success');
    document.getElementById('txn-form').reset();
    document.getElementById('t-date').value = new Date().toISOString().slice(0,10);
    await loadTransactions();
  } catch(err) { showToast('Failed: ' + err.message, 'error'); }
  btn.disabled = false; btn.textContent = 'Add Transaction';
}

async function loadTransactions() {
  try {
    const data = await api.get('/api/admin/transactions') || [];
    const tbody = document.getElementById('txn-table');
    if (!data.data?.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">No transactions yet</td></tr>'; return; }
    const invMap = {};
    investors.forEach(i => invMap[i.id] = i.name);
    tbody.innerHTML = data.data.slice(0,20).map(r => {
      const isBuy = Number(r.units) > 0;
      return `<tr>
        <td>${fmtDate(r.date)}</td>
        <td>${invMap[r.investor_id] || r.investor_id?.slice(0,8)}</td>
        <td style="font-weight:600">${r.instrument}</td>
        <td><span class="${isBuy?'pill pill-green':'pill pill-red'}">${isBuy?'+':''}${fmtNum(r.units)}</span></td>
        <td>RM ${Number(r.price||0).toFixed(4)}</td>
        <td class="td-right" style="font-weight:600;color:${isBuy?'#DC2626':'var(--green)'}">${fmtRM(r.net_amount)}</td>
        <td><span class="pill pill-gray" style="font-size:0.72rem">${r.theme||'—'}</span></td>
      </tr>`;
    }).join('');
  } catch(e) {}
}
</script>
</body>
</html>
