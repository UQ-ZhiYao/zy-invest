<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income Statement — ZY-Invest</title>
  <link rel="icon" href="../../assets/img/logo.png">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/dashboard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .fy-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .fy-tab  { padding:6px 16px; border-radius:99px; font-size:0.82rem; font-weight:600;
               border:1.5px solid var(--border); background:var(--white); cursor:pointer;
               color:var(--text-muted); transition:.15s; }
    .fy-tab:hover  { border-color:var(--blue); color:var(--blue); }
    .fy-tab.active { border-color:var(--blue); background:var(--blue); color:#fff; }
    .fy-tab.current { border-style:dashed; }
    .stmt-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .stmt-table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    .stmt-table tr td { padding:9px 12px; border-bottom:1px solid var(--border); }
    .stmt-table tr:last-child td { border-bottom:none; }
    .stmt-table .row-section td { font-weight:700; font-size:0.78rem; letter-spacing:.06em;
                                   text-transform:uppercase; color:var(--text-muted);
                                   background:var(--gray-50); padding:10px 12px; }
    .stmt-table .row-total td { font-weight:700; border-top:2px solid var(--border);
                                 border-bottom:2px solid var(--border); }
    .stmt-table .row-net td   { font-weight:700; font-size:1rem;
                                 border-top:3px double var(--border); }
    .stmt-table .row-sub td:first-child { padding-left:28px; color:var(--text-muted); }
    .amt { text-align:right; }
    .pos { color:var(--green); }
    .neg { color:#DC2626; }
    .chart-wrap { height:260px; position:relative; }
    @media(max-width:760px){ .stmt-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="dash-root">
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99"
       onclick="document.getElementById('sidebar').classList.remove('mobile-open');this.style.display='none'"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn"
          onclick="document.getElementById('sidebar').classList.toggle('mobile-open');
                   document.getElementById('sidebar-overlay').style.display='block'">☰</button>
        <span class="topbar-title">Income Statement</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </header>
    <div class="dash-content">
      <div class="page-header">
        <div class="breadcrumb">
          <a href="../../index.html">ZY-Invest</a><span>›</span>
          <span>Admin</span><span>›</span><span>Income Statement</span>
        </div>
        <h1>Income Statement</h1>
        <p>Fund income and profitability by financial year (Dec 1 — Nov 30).</p>
      </div>

      <!-- FY tabs -->
      <div class="fy-tabs" id="fy-tabs"></div>

      <!-- Chart + Statement grid -->
      <div class="stmt-grid">
        <!-- Left: chart -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Revenue vs Net Profit</h3>
          </div>
          <div class="chart-wrap">
            <canvas id="income-chart"></canvas>
          </div>
        </div>

        <!-- Right: KPIs -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title" id="kpi-fy-label">Key Figures</h3>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px" id="kpi-grid">
            <div class="metric-card"><div class="metric-label">Revenue</div>
              <div class="metric-value blue" id="kpi-revenue">—</div></div>
            <div class="metric-card"><div class="metric-label">Gross Profit</div>
              <div class="metric-value" id="kpi-gross">—</div></div>
            <div class="metric-card"><div class="metric-label">Net Profit</div>
              <div class="metric-value" id="kpi-net">—</div></div>
            <div class="metric-card"><div class="metric-label">Net Margin</div>
              <div class="metric-value" id="kpi-margin">—</div></div>
          </div>
        </div>
      </div>

      <!-- Income Statement table -->
      <div class="card" style="margin-top:20px">
        <div class="card-header">
          <h3 class="card-title" id="stmt-title">Income Statement</h3>
        </div>
        <table class="stmt-table" id="stmt-table">
          <colgroup><col style="width:65%"><col style="width:35%"></colgroup>
          <tbody id="stmt-body">
            <tr><td colspan="2" style="text-align:center;padding:32px;color:var(--text-muted)">
              Loading...</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/dashboard.js"></script>
<script>
let allData    = [];
let activeChart = null;
let selectedFY  = null;

document.addEventListener('DOMContentLoaded', async () => {
  initDashboard('admin-income', 'Income Statement');
  await loadData();
});

async function loadData() {
  try {
    allData = await api.get('/api/admin/financials/income-statement');
    renderTabs();
    // Default: latest FY
    if (allData.length) selectFY(allData[allData.length - 1].fy);
    renderChart();
  } catch(e) {
    showToast('Failed to load income statement: ' + e.message, 'error');
  }
}

function renderTabs() {
  const tabs = document.getElementById('fy-tabs');
  tabs.innerHTML = allData.map(d => `
    <button class="fy-tab${d.is_current ? ' current' : ''}"
            id="tab-${d.fy}" onclick="selectFY('${d.fy}')">
      ${d.fy}${d.is_current ? ' *' : ''}
    </button>`).join('');
}

function selectFY(fy) {
  selectedFY = fy;
  document.querySelectorAll('.fy-tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById('tab-' + fy);
  if (tab) tab.classList.add('active');
  const d = allData.find(x => x.fy === fy);
  if (d) { renderStatement(d); renderKPIs(d); }
}

function fmtRM(v) {
  const abs = Math.abs(v);
  const s   = 'RM ' + abs.toLocaleString('en-MY', {minimumFractionDigits:2, maximumFractionDigits:2});
  return v < 0 ? '(' + s + ')' : s;
}

function amtCell(v) {
  const cls = v < 0 ? 'neg' : v > 0 ? 'pos' : '';
  return `<td class="amt ${cls}">${fmtRM(v)}</td>`;
}

function renderStatement(d) {
  document.getElementById('stmt-title').textContent =
    `Income Statement — ${d.fy} (${d.fyb} to ${d.fye})`;

  const rows = [
    // Revenue
    { type:'section', label:'Revenue' },
    { type:'sub',  label:'Dividend Income',       val: d.dividend_income },
    { type:'sub',  label:'Interest & Fixed Income', val: d.interest_income },
    { type:'total', label:'Total Revenue',          val: d.revenue },
    // Costs
    { type:'section', label:'Operating Costs' },
    { type:'sub',  label:'Management Fees',        val: -d.mng_cost },
    { type:'sub',  label:'Performance Fees',       val: -d.perf_cost },
    { type:'total', label:'Total Costs',            val: -d.total_costs },
    // Gross
    { type:'gross', label:'Gross Profit',           val: d.gross_profit },
    // Other Income
    { type:'section', label:'Other Income / (Loss)' },
    { type:'sub',  label:'Realised P&L',           val: d.realised },
    { type:'sub',  label:'Unrealised Gains/(Loss)', val: d.unrealised },
    { type:'sub',  label:'Other Income',           val: d.other_misc },
    { type:'total', label:'Total Other Income',     val: d.other_total },
    // Net
    { type:'net',  label:'Net Profit / (Loss)',    val: d.net_profit },
  ];

  document.getElementById('stmt-body').innerHTML = rows.map(r => {
    if (r.type === 'section')
      return `<tr class="row-section"><td colspan="2">${r.label}</td></tr>`;
    if (r.type === 'gross')
      return `<tr class="row-total"><td>${r.label}</td>${amtCell(r.val)}</tr>`;
    if (r.type === 'net')
      return `<tr class="row-net"><td>${r.label}</td>${amtCell(r.val)}</tr>`;
    if (r.type === 'total')
      return `<tr class="row-total"><td>${r.label}</td>${amtCell(r.val)}</tr>`;
    return `<tr class="row-sub"><td>${r.label}</td>${amtCell(r.val)}</tr>`;
  }).join('');
}

function renderKPIs(d) {
  document.getElementById('kpi-fy-label').textContent = `${d.fy} Key Figures`;
  const setKPI = (id, val, isMarg) => {
    const el  = document.getElementById(id);
    const cls = val < 0 ? 'red' : val > 0 ? 'green' : '';
    el.className = 'metric-value ' + cls;
    el.textContent = isMarg
      ? (val >= 0 ? '+' : '') + val.toFixed(1) + '%'
      : fmtRM(val);
  };
  setKPI('kpi-revenue', d.revenue);
  setKPI('kpi-gross',   d.gross_profit);
  setKPI('kpi-net',     d.net_profit);
  const margin = d.revenue !== 0 ? (d.net_profit / d.revenue * 100) : 0;
  setKPI('kpi-margin', margin, true);
}

function renderChart() {
  const labels   = allData.map(d => d.fy);
  const revenue  = allData.map(d => d.revenue);
  const netProfit = allData.map(d => d.net_profit);

  if (activeChart) activeChart.destroy();
  const ctx = document.getElementById('income-chart').getContext('2d');
  activeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label:           'Revenue',
          data:            revenue,
          backgroundColor: 'rgba(21,101,192,0.7)',
          borderRadius:    4,
          order:           2,
        },
        {
          label:           'Net Profit',
          data:            netProfit,
          type:            'line',
          borderColor:     '#2E7D32',
          backgroundColor: 'rgba(46,125,50,0.1)',
          pointBackgroundColor: '#2E7D32',
          pointRadius:     4,
          borderWidth:     2,
          tension:         0.3,
          fill:            true,
          order:           1,
        },
      ]
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction:         { mode:'index', intersect:false },
      plugins: {
        legend:  { position:'bottom', labels:{ boxWidth:12, font:{ size:11 } } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' +
              'RM ' + Number(ctx.parsed.y).toLocaleString('en-MY',
                {minimumFractionDigits:2})
          }
        }
      },
      scales: {
        y: {
          ticks: {
            callback: v => 'RM ' + (Math.abs(v)>=1000
              ? (v/1000).toFixed(0)+'K' : v.toFixed(0))
          }
        }
      },
      onClick: (e, elements) => {
        if (elements.length) selectFY(allData[elements[0].index].fy);
      }
    }
  });
}
</script>
</body>
</html>
