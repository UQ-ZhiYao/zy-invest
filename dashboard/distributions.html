<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Distributions — ZY-Invest</title>
  <link rel="icon" href="../assets/img/logo.png">
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>
<div class="dash-root">
  <div id="sidebar-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="dash-main" id="dash-main">
    <header class="dash-topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('mobile-open');document.getElementById('sidebar-overlay').style.display='block'">☰</button>
        <span class="topbar-title" id="topbar-title">My Distributions</span>
      </div>
      <div class="topbar-right"><span class="topbar-date" id="topbar-date"></span></div>
    </header>
    <div class="dash-content">
      <div class="page-header">
        <div class="breadcrumb"><a href="../index.html">ZY-Invest</a><span>›</span><span>My Account</span><span>›</span><span>My Distributions</span></div>
        <h1>My Distributions</h1>
        <p>All dividends and distributions paid to your account.</p>
      </div>
      <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
        <div class="metric-card"><div class="metric-label">Total Received</div><div class="metric-value green" id="d-total">—</div></div>
        <div class="metric-card"><div class="metric-label">Last Distribution</div><div class="metric-value blue" id="d-last">—</div></div>
        <div class="metric-card"><div class="metric-label">Distributions Count</div><div class="metric-value" id="d-count">—</div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Distribution Records</h3></div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>FY</th><th>Title</th><th>Type</th><th>Ex-Date</th><th>Pmt Date</th><th>Units</th><th>DPS (sen)</th><th class="td-right">Amount</th><th>Status</th></tr></thead>
            <tbody id="dist-body"><tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  initDashboard('distributions', 'My Distributions');
  try {
    const data = await api.get('/api/member/account/distributions');
    const tbody = document.getElementById('dist-body');
    if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:32px;color:var(--text-muted)">No distributions yet</td></tr>'; return; }
    const total = data.reduce((s,r) => s + Number(r.amount||0), 0);
    document.getElementById('d-total').textContent = fmtRM(total);
    document.getElementById('d-last').textContent = fmtRM(data[0]?.amount);
    document.getElementById('d-count').textContent = data.length;
    tbody.innerHTML = data.map(r => `
      <tr>
        <td>${r.financial_year}</td>
        <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.title||'—'}</td>
        <td><span class="pill pill-blue">${r.dist_type}</span></td>
        <td>${fmtDate(r.ex_date)}</td>
        <td>${fmtDate(r.pmt_date)}</td>
        <td>${fmtUnits(r.units_at_ex_date)}</td>
        <td>${Number(r.dps_sen||0).toFixed(4)}</td>
        <td class="td-right">${fmtRM(r.amount)}</td>
        <td>${distStatus(r.ex_date, r.pmt_date)}</td>
      </tr>`).join('');
  } catch(e) { showToast('Failed to load distributions','error'); }
});
function distStatus(ex_date, pmt_date) {
  const today = new Date(); today.setHours(0,0,0,0);
  const ex  = ex_date  ? new Date(ex_date)  : null;
  const pmt = pmt_date ? new Date(pmt_date) : null;
  if (ex) { ex.setHours(0,0,0,0); }
  if (pmt){ pmt.setHours(0,0,0,0); }
  if (!ex || today < ex) {
    return '<span class="pill pill-blue">Upcoming</span>';
  } else if (!pmt || today <= pmt) {
    return '<span class="pill pill-orange">Entitled</span>';
  } else {
    return '<span class="pill pill-green">Paid</span>';
  }
}
</script>
</body>
</html>
